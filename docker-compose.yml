# =========================================================================
# Hot Dash — sobe só o app. A censura por IA (NudeNet) agora roda EMBUTIDA
# no próprio app (modelo 320n.onnx via onnxruntime-node), então NÃO precisa
# de serviço externo nem de configurar URL nenhuma:
#
#   docker compose up -d --build
#
# O serviço `nudenet` separado (abaixo, comentado) virou OPCIONAL/legado —
# use só se quiser rodar a detecção fora do app. Para isso, descomente o
# bloco e defina NUDENET_URL no app (ou pela tela Configurações → IA).
# =========================================================================

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    # environment:
    #   # Só se for usar o serviço NudeNet externo (opcional; veja abaixo).
    #   NUDENET_URL: http://nudenet:8000
    #   NUDENET_API_KEY: troque-por-um-token
    ports:
      - "3000:3000"
    volumes:
      - hotdash-data:/app/data

  # --- OPCIONAL / legado: serviço NudeNet externo -------------------------
  # Descomente se preferir rodar a detecção fora do app (o embutido já cobre
  # o caso normal). Lembre de descomentar NUDENET_URL no app acima.
  # nudenet:
  #   build: ./nudenet-service
  #   restart: unless-stopped
  #   # environment:
  #   #   NUDENET_API_KEY: troque-por-um-token
  #   expose:
  #     - "8000"

volumes:
  hotdash-data:
